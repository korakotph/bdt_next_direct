version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sample5_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
      POSTGRES_DB: directus
    volumes:
      - sample5_postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"

  directus:
    image: directus/directus:latest
    container_name: sample5_directus
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8060:8055"
    environment:
      CORS_ENABLED: "true"
      # TODO: จำกัด CORS_ORIGIN ให้เฉพาะ domain จริง เช่น "https://example.com"
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS"
      CORS_HEADERS: "Content-Type,Authorization"

      # SECURITY: เปลี่ยน KEY และ SECRET ให้เป็น random string ยาวอย่างน้อย 32 ตัวอักษร
      KEY: "supersecretkey"
      SECRET: "supersecretsecret"

      DB_CLIENT: "pg"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: directus
      # SECURITY: เปลี่ยน DB_USER และ DB_PASSWORD ก่อน deploy production
      DB_USER: directus
      DB_PASSWORD: directus

      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: /directus/uploads

      ADMIN_EMAIL: phromchaiman_k@su.ac.th
      # SECURITY: เปลี่ยน ADMIN_PASSWORD ก่อน deploy production
      ADMIN_PASSWORD: krt123

      # URL สาธารณะของ Directus — ใช้สำหรับ generate asset URL ให้ถูกต้อง
      PUBLIC_URL: http://localhost:8060
    volumes:
      - ./directus/uploads:/directus/uploads
      - ./directus/migrations:/directus/migrations
      - ./directus/extensions:/directus/extensions

  nextjs:
    build:
      context: ./next-app
      args:
        # ส่ง NEXT_PUBLIC_* เข้า Docker build เพื่อ bake ลง client bundle
        NEXT_PUBLIC_DIRECTUS_URL: http://localhost:8060
        NEXT_PUBLIC_BASE_PATH: ""
    container_name: sample5_nextjs
    restart: unless-stopped
    ports:
      - "3016:3000"
    environment:
      DIRECTUS_INTERNAL_URL: http://directus:8055
      NEXT_PUBLIC_DIRECTUS_URL: http://localhost:8060
      NEXT_PUBLIC_BASE_PATH: ""
    depends_on:
      - directus

volumes:
  sample5_postgres_data:
